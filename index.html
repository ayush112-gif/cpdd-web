<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mail Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/iconfont/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --c1:#ff6b6b;--c2:#feca57;--c3:#48dbfb;--c4:#ff9ff3;--c5:#54a0ff;--c6:#1dd1a1;
  --bg:#080810;
  --s1:#0f0f1a;--s2:#13131f;--s3:#181826;
  --bdr:rgba(255,255,255,0.08);--bdr2:rgba(255,255,255,0.15);
  --t1:#ffffff;--t2:rgba(255,255,255,0.62);--t3:rgba(255,255,255,0.3);
}
html,body{height:100%;background:var(--bg);overflow-x:hidden;font-family:'Inter',sans-serif;color:var(--t1);}

/* ═══ BG ═══ */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;will-change:transform;}
.o1{width:380px;height:380px;background:radial-gradient(circle,rgba(255,107,107,0.5),transparent 68%);top:-100px;left:-100px;animation:oa 10s ease-in-out infinite;}
.o2{width:320px;height:320px;background:radial-gradient(circle,rgba(84,160,255,0.45),transparent 68%);top:25%;right:-80px;animation:ob 12s ease-in-out infinite;}
.o3{width:350px;height:350px;background:radial-gradient(circle,rgba(255,159,243,0.42),transparent 68%);bottom:5%;left:0;animation:oc 14s ease-in-out infinite;}
.o4{width:250px;height:250px;background:radial-gradient(circle,rgba(254,202,87,0.4),transparent 68%);bottom:30%;right:-20px;animation:od 9s ease-in-out infinite;}
@keyframes oa{0%,100%{transform:translate(0,0)}40%{transform:translate(50px,40px)}70%{transform:translate(-20px,60px)}}
@keyframes ob{0%,100%{transform:translate(0,0)}35%{transform:translate(-45px,50px)}70%{transform:translate(30px,-40px)}}
@keyframes oc{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-50px)}66%{transform:translate(-30px,30px)}}
@keyframes od{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-40px)}}

.grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);
  background-size:48px 48px;animation:gs 24s linear infinite;}
@keyframes gs{0%{background-position:0 0,0 0}100%{background-position:0 48px,48px 0}}

.pts{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.pt{position:absolute;border-radius:50%;animation:pu linear infinite;}
@keyframes pu{0%{transform:translateY(105vh);opacity:0}8%{opacity:1}88%{opacity:.5}100%{transform:translateY(-8vh);opacity:0}}

/* ═══ SHELL ═══ */
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;background:rgba(8,8,16,0.52);}

/* ═══ HEADER ═══ */
.hdr{
  position:sticky;top:0;z-index:20;
  background:rgba(8,8,16,0.7);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid var(--bdr);
  overflow:hidden;
}
/* header animated deco */
.hdr-deco{position:absolute;inset:0;pointer-events:none;}
.hdr-inner{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:13px 18px 11px;}

/* logo mark — animated envelope */
.logo-mark{
  width:46px;height:46px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(145deg,#1a0a25,#0e0e22);
  border:1px solid rgba(255,107,107,0.35);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:0 0 24px rgba(255,107,107,0.3),inset 0 1px 0 rgba(255,255,255,0.08);
}
.logo-mark::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,107,107,0.15),rgba(255,159,243,0.08));border-radius:14px;}
.logo-svg{width:26px;height:26px;position:relative;z-index:1;}

/* brand name */
.brand{font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:800;letter-spacing:-0.5px;line-height:1;
  background:linear-gradient(100deg,#fff 0%,#ffd6d6 35%,#ff9ff3 65%,#ff6b6b 100%);
  background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:bsh 5s linear infinite;}
@keyframes bsh{0%{background-position:0% center}100%{background-position:200% center}}
.brand-sub{font-size:10px;color:var(--t3);font-weight:500;letter-spacing:.06em;margin-top:2px;}

.live-badge{display:flex;align-items:center;gap:5px;background:rgba(29,209,161,0.1);border:1px solid rgba(29,209,161,0.25);border-radius:20px;padding:5px 10px;}
.live-dot{width:7px;height:7px;background:#1dd1a1;border-radius:50%;box-shadow:0 0 10px rgba(29,209,161,0.9);animation:ldp 2s ease-in-out infinite;}
.live-txt{font-size:10px;font-weight:700;color:#1dd1a1;letter-spacing:.06em;}
@keyframes ldp{0%,100%{box-shadow:0 0 8px rgba(29,209,161,.8)}50%{box-shadow:0 0 18px rgba(29,209,161,1)}}

/* ═══ CONTENT ═══ */
.content{flex:1;overflow-y:auto;padding:18px 16px 56px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px;}

/* labels */
.lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;display:block;}

/* ═══ TABS ═══ */
.mode-tabs{display:grid;grid-template-columns:1fr 1fr;background:rgba(255,255,255,0.04);border:1px solid var(--bdr);border-radius:16px;padding:4px;gap:4px;margin-bottom:20px;}
.mtab{padding:10px 0;border:none;background:transparent;color:var(--t2);font-size:13px;font-weight:600;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .28s;font-family:'Inter',sans-serif;}
.mtab i{font-size:15px;}
.mtab.active{background:linear-gradient(135deg,var(--c1),var(--c4));color:#fff;box-shadow:0 4px 18px rgba(255,107,107,.32);}

.itabs{display:flex;gap:6px;margin-bottom:14px;}
.itab{padding:7px 16px;border:1px solid var(--bdr);background:transparent;color:var(--t2);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
.itab.active{border-color:rgba(255,107,107,.55);color:var(--c1);background:rgba(255,107,107,.08);}

/* ═══ INPUTS ═══ */
textarea,input[type=text],input[type=email]{
  width:100%;padding:13px 14px;
  background:rgba(255,255,255,0.05);border:1px solid var(--bdr);border-radius:12px;
  color:var(--t1);font-family:'Inter',sans-serif;font-size:13.5px;line-height:1.55;
  margin-bottom:12px;transition:all .22s;resize:none;
}
textarea::placeholder,input::placeholder{color:var(--t3);}
textarea:focus,input:focus{outline:none;border-color:rgba(255,107,107,.5);background:rgba(255,255,255,.07);box-shadow:0 0 0 3px rgba(255,107,107,.1);}

/* ═══ BUTTONS ═══ */
.bp{width:100%;padding:13px;background:linear-gradient(135deg,var(--c1),var(--c4));color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .28s;font-family:'Inter',sans-serif;box-shadow:0 4px 20px rgba(255,107,107,.26);position:relative;overflow:hidden;}
.bp::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.14),transparent);}
.bp:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,107,107,.42);}
.bp:active{transform:translateY(0);}

.bs{width:100%;padding:11px;background:rgba(255,255,255,.06);color:var(--t2);border:1px solid var(--bdr);border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;font-family:'Inter',sans-serif;}
.bs:hover{background:rgba(255,255,255,.1);color:var(--t1);border-color:var(--bdr2);}
.bwa{background:rgba(29,209,161,.1);color:var(--c6);border-color:rgba(29,209,161,.22);}
.bwa:hover{background:rgba(29,209,161,.18);color:var(--c6);}

/* ═══ FILE ═══ */
input[type=file]{display:none;}
.fl{display:block;padding:20px;border:1.5px dashed rgba(255,107,107,.35);border-radius:12px;text-align:center;cursor:pointer;transition:all .25s;background:rgba(255,107,107,.05);margin-bottom:12px;color:var(--c1);font-weight:600;font-size:13px;}
.fl:hover{border-color:var(--c1);background:rgba(255,107,107,.1);}
.fl i{font-size:24px;display:block;margin-bottom:6px;}
.fn{font-size:12px;color:var(--t3);text-align:center;margin-bottom:12px;}

/* ═══ RESULT CARD ═══ */
.rcard{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:20px;overflow:hidden;margin-top:18px;position:relative;}
.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c1),var(--c4),var(--c3),var(--c2),var(--c1));background-size:200%;animation:rb 3s linear infinite;}
@keyframes rb{0%{background-position:0% center}100%{background-position:200% center}}
.rch{padding:16px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;gap:12px;}
.cav{width:44px;height:44px;min-width:44px;background:linear-gradient(135deg,var(--c1),var(--c4));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;box-shadow:0 0 18px rgba(255,107,107,.32);}
.cnm{font-size:17px;font-weight:700;color:var(--t1);letter-spacing:-.2px;}
.crl{font-size:12px;color:var(--t2);margin-top:3px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--bdr);}
.fc{padding:12px 14px;background:var(--bg);}
.fk{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-weight:700;margin-bottom:5px;}
.fv{font-size:13px;font-weight:600;color:var(--t1);}
.fv.g{color:#4ade80;}
.ssec{padding:14px 16px;border-top:1px solid var(--bdr);}
.stxt{font-size:12.5px;line-height:1.7;color:var(--t2);}
.arow{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px;border-top:1px solid var(--bdr);}
.arow .bs{padding:10px;}

/* ═══ ATTACH ═══ */
.alist{margin:10px 0;}
.aitm{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:8px;margin-bottom:7px;}
.aitm .aico{font-size:15px;color:var(--c1);}
.aitm .anm{flex:1;font-size:12px;font-weight:500;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rmbtn{background:rgba(239,68,68,.1);color:#f87171;border:none;padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.rmbtn:hover{background:rgba(239,68,68,.18);}

.hidden{display:none!important;}

/* ═══ MAIL SHEET ═══ */
.sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(16px);display:none;align-items:flex-end;z-index:1000;}
.sheet-ov.show{display:flex;}
.sheet{background:rgba(12,12,20,.98);border:1px solid var(--bdr);border-top:1px solid rgba(255,255,255,.14);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;animation:sup .38s cubic-bezier(.34,1.2,.64,1);}
@keyframes sup{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.dpill{width:38px;height:4px;background:rgba(255,255,255,.14);border-radius:2px;margin:14px auto 0;}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 16px;border-bottom:1px solid var(--bdr);}
.mhdr h2{font-size:17px;font-weight:700;}
.xbtn{width:32px;height:32px;background:rgba(255,255,255,.06);border:1px solid var(--bdr);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:15px;transition:all .2s;}
.xbtn:hover{background:rgba(255,255,255,.1);color:var(--t1);}
.mbdy{padding:18px 20px;}
.mwrap{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.msubj{padding:11px 14px;border-bottom:1px solid var(--bdr);font-size:13px;font-weight:600;color:var(--c1);display:flex;align-items:center;gap:8px;}
.mbodyp{padding:12px 14px;font-size:12.5px;line-height:1.7;color:var(--t2);max-height:130px;overflow-y:auto;white-space:pre-wrap;}
.etog{width:100%;padding:9px;background:transparent;border:1px dashed rgba(255,107,107,.3);color:var(--c1);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;margin-bottom:14px;}
.etog:hover{background:rgba(255,107,107,.08);}
.tedit{width:100%;padding:13px 14px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,107,107,.4);border-radius:12px;color:var(--t1);font-family:'Inter',sans-serif;font-size:13px;line-height:1.6;min-height:120px;resize:vertical;margin-bottom:10px;}
.tedit:focus{outline:none;box-shadow:0 0 0 3px rgba(255,107,107,.12);}
.eacts{display:flex;gap:8px;margin-bottom:14px;}
.eacts button{flex:1;padding:9px;font-size:12px;}
.mftr{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--bdr);}
.mftr button{flex:1;}

/* ═══ CARTOON POPUP MODAL ═══ */
.pop-ov{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(18px);display:none;align-items:center;justify-content:center;z-index:2000;padding:24px;}
.pop-ov.show{display:flex;}

.pop-box{
  background:linear-gradient(160deg,var(--s2),var(--s3));
  border:1px solid rgba(255,255,255,.1);
  border-radius:28px;
  width:100%;max-width:310px;
  padding:0 0 28px;
  text-align:center;
  position:relative;overflow:hidden;
  animation:popIn .5s cubic-bezier(.34,1.4,.64,1);
}
@keyframes popIn{0%{transform:scale(.25) rotate(-12deg);opacity:0}60%{transform:scale(1.06) rotate(2deg)}80%{transform:scale(.97) rotate(-1deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
.pop-rainbow{height:3px;background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3),var(--c4),var(--c5),var(--c6),var(--c1));background-size:200%;animation:rb 2s linear infinite;border-radius:28px 28px 0 0;}

/* scene area */
.pop-scene{width:160px;height:160px;margin:20px auto 14px;position:relative;}
.pop-scene canvas,.pop-scene svg{width:100%;height:100%;}

.pop-title{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:800;color:var(--t1);margin-bottom:5px;letter-spacing:-.3px;}
.pop-sub{font-size:13px;color:var(--t2);line-height:1.5;padding:0 20px;}

/* bouncing dots */
.bdots{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:16px;}
.bd{width:9px;height:9px;border-radius:50%;}
.bd:nth-child(1){background:var(--c1);animation:bdp 1.1s .0s ease-in-out infinite;}
.bd:nth-child(2){background:var(--c4);animation:bdp 1.1s .18s ease-in-out infinite;}
.bd:nth-child(3){background:var(--c3);animation:bdp 1.1s .36s ease-in-out infinite;}
@keyframes bdp{0%,100%{transform:translateY(0) scale(1)}45%{transform:translateY(-10px) scale(1.2)}}

/* ═══ SUCCESS POPUP ═══ */
.suc-ov{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(18px);display:none;align-items:center;justify-content:center;z-index:2000;padding:24px;}
.suc-ov.show{display:flex;}
.suc-box{background:linear-gradient(160deg,var(--s2),var(--s3));border:1px solid rgba(255,255,255,.1);border-radius:28px;width:100%;max-width:300px;padding:0 0 28px;text-align:center;position:relative;overflow:hidden;animation:popIn .5s cubic-bezier(.34,1.4,.64,1);}

/* confetti pieces */
.cpc{position:absolute;border-radius:2px;animation:cfal linear forwards;}
@keyframes cfal{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(200px) rotate(540deg);opacity:0}}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(110px);background:rgba(18,18,26,.96);border:1px solid var(--bdr);color:var(--t1);padding:11px 20px;border-radius:12px;font-size:13px;font-weight:500;opacity:0;transition:all .28s;z-index:9999;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.5);backdrop-filter:blur(12px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.sec{margin-bottom:18px;}

/* ═══ CARTOON KEYFRAMES (used inside SVGs via style attr) ═══ */
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes blink{0%,88%,100%{transform:scaleY(1)}93%{transform:scaleY(.08)}}
@keyframes wave{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-28deg)}}
@keyframes waveR{0%,100%{transform:rotate(0deg)}50%{transform:rotate(28deg)}}
@keyframes antPulse{0%,100%{r:4}50%{r:7}}
@keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes scanY{0%{transform:translateY(0)}100%{transform:translateY(44px)}}
@keyframes envBob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(4deg)}}
@keyframes penWrite{0%,100%{transform:rotate(30deg) translate(0,0)}50%{transform:rotate(30deg) translate(3px,-3px)}}
@keyframes rocketBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes flame{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.3) scaleX(.85)}}
@keyframes spk{0%,100%{opacity:0;transform:scale(0)}45%,55%{opacity:1;transform:scale(1)}}
@keyframes checkDraw{0%{stroke-dashoffset:40}100%{stroke-dashoffset:0}}
@keyframes ringPulse{0%{r:24;opacity:.8}100%{r:52;opacity:0}}
@keyframes floatLetter{0%{transform:translate(0,0) rotate(-5deg)}50%{transform:translate(30px,-20px) rotate(10deg)}100%{transform:translate(70px,-10px) rotate(-3deg);opacity:0}}
</style>
</head>
<body>

<!-- ── BACKGROUND ── -->
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div><div class="orb o4"></div>
<div class="grid"></div>
<div class="pts" id="pts"></div>

<div class="shell">

<!-- ═══════════ HEADER ═══════════ -->
<div class="hdr">
  <!-- Animated header deco SVG -->
  <svg class="hdr-deco" viewBox="0 0 430 72" fill="none" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:1;">
    <!-- flying envelopes -->
    <g style="animation:envBob 4s ease-in-out infinite;transform-origin:370px 20px;">
      <rect x="356" y="10" width="30" height="22" rx="4" fill="none" stroke="rgba(255,159,243,0.35)" stroke-width="1.5"/>
      <polyline points="356,10 371,22 386,10" fill="none" stroke="rgba(255,159,243,0.35)" stroke-width="1.5"/>
      <circle cx="378" cy="28" r="3" fill="rgba(254,202,87,0.6)" style="animation:spk 2s .3s ease-in-out infinite;"/>
    </g>
    <g style="animation:envBob 5s 1.2s ease-in-out infinite;transform-origin:50px 50px;">
      <rect x="38" y="42" width="22" height="16" rx="3" fill="none" stroke="rgba(84,160,255,0.3)" stroke-width="1.2"/>
      <polyline points="38,42 49,50 60,42" fill="none" stroke="rgba(84,160,255,0.3)" stroke-width="1.2"/>
    </g>
    <!-- sparkles -->
    <circle cx="300" cy="10" r="2.5" fill="rgba(254,202,87,0.7)" style="animation:spk 1.8s .2s ease-in-out infinite;"/>
    <circle cx="160" cy="62" r="2" fill="rgba(72,219,251,0.7)" style="animation:spk 2.2s .6s ease-in-out infinite;"/>
    <circle cx="110" cy="12" r="2" fill="rgba(255,107,107,0.6)" style="animation:spk 1.6s .9s ease-in-out infinite;"/>
    <circle cx="340" cy="58" r="1.8" fill="rgba(29,209,161,0.7)" style="animation:spk 2s 1.1s ease-in-out infinite;"/>
    <circle cx="220" cy="8" r="2.2" fill="rgba(255,159,243,0.65)" style="animation:spk 1.9s .4s ease-in-out infinite;"/>
    <!-- subtle wave -->
    <path d="M0,50 Q60,38 120,50 Q180,62 240,50 Q300,38 360,50 Q400,58 430,50" fill="none" stroke="rgba(255,107,107,0.18)" stroke-width="1.2"/>
    <path d="M0,60 Q80,48 160,60 Q240,72 320,60 Q380,52 430,60" fill="none" stroke="rgba(84,160,255,0.12)" stroke-width="1"/>
    <!-- small stars (4-point) -->

function setScene(type){
  const sc=SCENES[type]||SCENES.analyze;
  document.getElementById('pop-scene').innerHTML=sc.svg;
  document.getElementById('pop-title').textContent=sc.title;
  document.getElementById('pop-sub').textContent=sc.sub;
}
function showLoading(type){setScene(type);document.getElementById('loadingModal').classList.add('show');}
function hideLoading(){document.getElementById('loadingModal').classList.remove('show');}

/* ── confetti ── */
function spawnConfetti(){
  const box=document.getElementById('suc-box');
  const cl=['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#1dd1a1','#54a0ff','#fff'];
  for(let i=0;i<24;i++){
    const c=document.createElement('div');c.className='cpc';
    const s=Math.random()*9+5;
    Object.assign(c.style,{
      left:Math.random()*100+'%',top:'40px',
      width:s+'px',height:s+'px',
      background:cl[i%cl.length],
      borderRadius:Math.random()>.5?'50%':'3px',
      transform:`rotate(${Math.random()*360}deg)`,
      animationDuration:(Math.random()*.9+.8)+'s',
      animationDelay:(Math.random()*.5)+'s'
    });
    box.appendChild(c);
    setTimeout(()=>c.remove(),2500);
  }
}

/* ── modal helpers ── */
function showSheet(id){document.getElementById(id).classList.add('show');}
function closeSheet(id){document.getElementById(id).classList.remove('show');}
function closeAllModals(){
  document.querySelectorAll('.sheet-ov,.pop-ov,.suc-ov').forEach(m=>m.classList.remove('show'));
  state.mailAttachedFiles=[];state.isEditMode=false;
  document.getElementById('edit-section').classList.add('hidden');
  document.getElementById('mail-attach-list').innerHTML='';
}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}

/* ── tab switchers ── */

  state.mode=mode;
  document.getElementById('analyze-mode').classList.toggle('hidden',mode!=='analyze');
  document.getElementById('custom-mode').classList.toggle('hidden',mode!=='custom');
  document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('active',(i===0&&mode==='analyze')||(i===1&&mode==='custom')));
}
function switchTab(tab){
  document.getElementById('text-input').classList.toggle('hidden',tab!=='text');
  document.getElementById('file-input').classList.toggle('hidden',tab!=='file');
  document.querySelectorAll('#analyze-mode .itab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='text')||(i===1&&tab==='file')));
}
function switchCustomTab(which){
  document.getElementById('ai-section').classList.toggle('hidden',which!=='ai');
  document.getElementById('manual-section').classList.toggle('hidden',which!=='manual');
  document.querySelectorAll('#custom-mode .itab').forEach((b,i)=>b.classList.toggle('active',(i===0&&which==='ai')||(i===1&&which==='manual')));
}

/* ── attachments ── */
document.getElementById('file-upload').addEventListener('change',e=>{document.getElementById('file-name').textContent=e.target.files[0]?.name||'';});
document.getElementById('mail-attach-files').addEventListener('change',e=>{
  state.mailAttachedFiles=Array.from(e.target.files).slice(0,4);
  renderAttach();
  if(state.mailAttachedFiles.length)toast(`✓ ${state.mailAttachedFiles.length} file(s) added`);
  e.target.value='';
});
function renderAttach(){
  const l=document.getElementById('mail-attach-list');
  if(!state.mailAttachedFiles.length){l.innerHTML='';return;}
  l.innerHTML=state.mailAttachedFiles.map((f,i)=>`<div class="aitm"><i class="ti ti-paperclip aico"></i><span class="anm">${f.name}</span><button class="rmbtn" onclick="removeAttach(${i})">Remove</button></div>`).join('');
}
function removeAttach(i){state.mailAttachedFiles.splice(i,1);renderAttach();}

/* ── edit ── */
function toggleEditMode(){state.isEditMode=!state.isEditMode;document.getElementById('edit-section').classList.toggle('hidden');if(state.isEditMode)document.getElementById('edit-body').value=state.mailBody;}
function cancelEdit(){state.isEditMode=false;document.getElementById('edit-section').classList.add('hidden');}
function saveEdit(){const nb=document.getElementById('edit-body').value.trim();if(!nb){toast('❌ Body cannot be empty');return;}state.mailBody=nb;document.getElementById('modal-body').textContent=state.mailBody;state.isEditMode=false;document.getElementById('edit-section').classList.add('hidden');toast('✓ Mail updated');}

/* ══════════════════════════════
   APP STATE + API FUNCTIONS
══════════════════════════════ */
const API='https://cpdd-web.onrender.com';
let state={mode:'analyze',jobData:null,originalText:'',mailSubject:'',mailBody:'',originalMailBody:'',mailAttachedFiles:[],isEditMode:false};

async function analyzeNotice(){
  const text=document.getElementById('notice-text').value.trim();
  if(!text){toast('❌ Paste or upload a notice');return;}
  showLoading('analyze');
  try{
    const res=await fetch(`${API}/api/analyze-notice`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    const data=await res.json();if(!res.ok)throw new Error(data.error||'Failed');
    state.jobData=data.jobData;state.originalText=text;
    const co=data.jobData.company_name||'—';
    document.getElementById('company-initial').textContent=co[0]||'?';
    document.getElementById('company-name').textContent=co;
    document.getElementById('role-name').textContent=data.jobData.role||'—';
    document.getElementById('ctc').textContent=data.jobData.ctc||'—';
    document.getElementById('location').textContent=data.jobData.location||'—';
    document.getElementById('batch').textContent=data.jobData.batch||'—';
    document.getElementById('deadline').textContent=data.jobData.deadline||'—';
    document.getElementById('summary').textContent=data.jobData.summary||'—';
    document.getElementById('slip-section').classList.remove('hidden');
    hideLoading();toast('✓ Analysis complete');
  }catch(e){hideLoading();toast('❌ '+e.message);}
}

async function openMailModal(){
  if(!state.jobData)return;
  showLoading('mail');
  try{
    const res=await fetch(`${API}/api/generate-mail`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({originalText:state.originalText,jobData:state.jobData})});
    const data=await res.json();if(!res.ok)throw new Error(data.error||'Failed');
    state.mailBody=data.mailDraft;state.originalMailBody=data.mailDraft;
    state.mailSubject=`[${state.jobData.company_name||'Placement'}]`;state.mailAttachedFiles=[];
    document.getElementById('modal-subject').textContent=state.mailSubject;
    document.getElementById('modal-body').textContent=state.mailBody;
    document.getElementById('mail-attach-list').innerHTML='';document.getElementById('modal-email').value='';
    document.getElementById('edit-section').classList.add('hidden');state.isEditMode=false;
    hideLoading();showSheet('mailModal');
  }catch(e){hideLoading();toast('❌ '+e.message);}
}

async function generateWA(){
  if(!state.jobData)return;
  try{
    const res=await fetch(`${API}/api/generate-whatsapp`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({originalText:state.originalText,jobData:state.jobData})});
    const data=await res.json();if(!res.ok)throw new Error(data.error||'Failed');
    toast('✓ WhatsApp message ready');
  }catch(e){toast('❌ '+e.message);}
}

async function generateCustomAI(){
  const instruction=document.getElementById('custom-instruction').value.trim();
  if(!instruction){toast('❌ Describe what you need');return;}
  showLoading('mail');
  try{
    const res=await fetch(`${API}/api/generate-custom-mail`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({instruction})});
    const data=await res.json();if(!res.ok)throw new Error(data.error||'Failed');
    state.mailBody=data.mailDraft;state.originalMailBody=data.mailDraft;
    state.mailSubject='Custom mail';state.jobData={};state.mailAttachedFiles=[];
    document.getElementById('modal-subject').textContent=state.mailSubject;
    document.getElementById('modal-body').textContent=state.mailBody;
    document.getElementById('mail-attach-list').innerHTML='';document.getElementById('modal-email').value='';
    document.getElementById('edit-section').classList.add('hidden');state.isEditMode=false;
    hideLoading();showSheet('mailModal');
  }catch(e){hideLoading();toast('❌ '+e.message);}
}

function openManualMailModal(){
  const subject=document.getElementById('manual-subject').value.trim();
  const body=document.getElementById('manual-body').value.trim();
  if(!subject||!body){toast('❌ Enter subject and message');return;}
  state.mailBody=body;state.originalMailBody=body;state.mailSubject=subject;state.jobData={};state.mailAttachedFiles=[];
  document.getElementById('modal-subject').textContent=state.mailSubject;
  document.getElementById('modal-body').textContent=state.mailBody;
  document.getElementById('mail-attach-list').innerHTML='';document.getElementById('modal-email').value='';
  document.getElementById('edit-section').classList.add('hidden');state.isEditMode=false;
  showSheet('mailModal');
}

async function sendMailModal(){
  const to=document.getElementById('modal-email').value.trim();
  if(!to||!to.includes('@')){toast('❌ Enter a valid email');return;}
  if(!state.mailBody){toast('❌ Mail is empty');return;}
  closeSheet('mailModal');
  showLoading('send');
  try{
    const fd=new FormData();
    fd.append('to',to);fd.append('subject',state.mailSubject);fd.append('body',state.mailBody);fd.append('jobData',JSON.stringify(state.jobData||{}));
    state.mailAttachedFiles.forEach(f=>fd.append('attachments',f));
    const res=await fetch(`${API}/api/send-mail`,{method:'POST',body:fd});
    const data=await res.json();if(!res.ok)throw new Error(data.error||'Failed');
    hideLoading();
    document.getElementById('successText').textContent=`Delivered to ${to} 🚀`;
    document.getElementById('successModal').classList.add('show');
    setTimeout(spawnConfetti,80);
    setTimeout(closeAllModals,3200);
  }catch(e){hideLoading();toast('❌ '+e.message);}
}
